<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy rounded square background -->
  <rect width="64" height="64" rx="10" fill="#1B2B4B"/>
  <!-- Sky-blue vertical accent bar -->
  <rect x="6" y="6" width="3.5" height="52" rx="1.75" fill="#4A72B8"/>
  <!-- "R" in cream/white (Regarding) -->
  <text x="16" y="46"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="40"
        font-weight="500"
        fill="#F6F7F9">R</text>
  <!-- "R" in sky blue, italic (Retirement) -->
  <text x="36" y="46"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="40"
        font-weight="500"
        font-style="italic"
        fill="#4A72B8">R</text>
</svg>
